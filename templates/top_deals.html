<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Deals | P-13</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }

    .header {
      background: #1F3864; color: white; padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .header h1 { font-size: 1.35rem; }
    .header p  { font-size: 0.82rem; opacity: 0.75; margin-top: 4px; }
    .nav { display: flex; gap: 10px; }
    .nav a {
      color: white; text-decoration: none; font-size: 0.85rem;
      padding: 7px 16px; border-radius: 20px;
      background: rgba(255,255,255,0.15); transition: background 0.2s;
    }
    .nav a:hover, .nav a.active { background: #2E75B6; }

    .container { max-width: 1150px; margin: 28px auto; padding: 0 22px; }

    .card { background: white; border-radius: 10px; padding: 26px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .card h2 { font-size: 1.1rem; color: #1F3864; margin-bottom: 8px; padding-bottom: 10px; border-bottom: 2px solid #e8edf3; }
    .card p { font-size: 0.84rem; color: #555; margin-bottom: 18px; }

    .table-wrap { overflow-x: auto; }
    table.summary-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    table.summary-table th { background: #1F3864; color: white; padding: 10px 14px; text-align: left; white-space: nowrap; }
    table.summary-table td { padding: 9px 14px; border-bottom: 1px solid #eef2f7; }
    table.summary-table tr:hover td { background: #f0f6ff; }

    /* Highlight rank column */
    table.summary-table td:first-child { font-weight: bold; color: #2E75B6; text-align: center; }
    table.summary-table th:first-child { text-align: center; }

    .btn { display: inline-block; margin-top: 18px; padding: 9px 22px; background: #1F3864; color: white; text-decoration: none; border-radius: 7px; font-size: 0.9rem; font-weight: bold; transition: background 0.2s; }
    .btn:hover { background: #2E75B6; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>E-Commerce Product Price Analyzer</h1>
    <p>AI-130 · P-13 · Group 13 · Abdullah Mughal &amp; Huzaifa Abdureahaman</p>
  </div>
  <nav class="nav">
    <a href="/">🏠 Home</a>
    <a href="/top_deals" class="active">🔥 Top Deals</a>
  </nav>
</div>

<div class="container">
  <div class="card" style="margin-top: 28px;">
    <h2>🔥 Top 20 Products by Highest Discount</h2>
    <p>Products sorted by discount percentage (highest first). Prices are in Indian Rupees (₹).</p>
    <div class="table-wrap">
      {{ table | safe }}
    </div>
    <a class="btn" href="/">← Back to Home</a>
  </div>
</div>

</body>
</html>
